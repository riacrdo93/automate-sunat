name: release-on-main

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-on-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag from desktop version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./desktop/package.json').version")"
          TAG="v${VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "Tag already exists: $TAG"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created tag: $TAG"

  build:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Build desktop installers
        run: npm run desktop:package

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/latest*.yml
            desktop/release/*.blockmap
          if-no-files-found: ignore

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            desktop/release/*.AppImage
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/latest*.yml
            desktop/release/*.blockmap
